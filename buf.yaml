version: v2
# Single buf module at proto/, containing multiple top-level packages
# (orders.v1, users.v1). Per-module overrides are layered for vendored
# protos like grpc.health.v1 that ship with non-STANDARD naming.
modules:
  - path: proto
    name: buf.build/mateokadiu/grpc-monorepo-starter
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    # The Order/User entities are intentionally returned from both
    # GetX (unary) and ListX (server-streaming) RPCs. The stream
    # naming convention is documented in the proto.
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
  # Vendored upstream protos use legacy naming we don't control.
  ignore:
    - proto/grpc
breaking:
  use:
    - FILE
