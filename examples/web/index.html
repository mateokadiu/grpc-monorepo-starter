<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>connect-web demo — grpc-monorepo-starter</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; margin: 2rem auto; max-width: 720px; color: #222; }
      h1 { font-size: 1.4rem; margin-bottom: .2rem; }
      .sub { color: #666; margin-bottom: 1.5rem; }
      fieldset { border: 1px solid #ddd; padding: 1rem 1.2rem; margin-bottom: 1.2rem; }
      legend { font-weight: 600; padding: 0 .4rem; }
      label { display: inline-block; min-width: 6rem; }
      input { font: inherit; padding: .25rem .4rem; border: 1px solid #ccc; border-radius: 3px; }
      button { font: inherit; padding: .35rem .9rem; border: 1px solid #333; border-radius: 3px; background: #fff; cursor: pointer; }
      pre { background: #f6f6f6; padding: .8rem; border-radius: 4px; overflow-x: auto; }
      .row { margin-bottom: .5rem; }
    </style>
  </head>
  <body>
    <h1>connect-web demo</h1>
    <p class="sub">Same <code>.proto</code> as service-a, called from the browser via the Connect protocol. Point <code>baseUrl</code> at a Connect-protocol gateway (envoy-grpc-web, connect-go, vanguard).</p>

    <fieldset>
      <legend>Settings</legend>
      <div class="row"><label for="baseUrl">Base URL</label><input id="baseUrl" value="http://localhost:8080" size="40" /></div>
    </fieldset>

    <fieldset>
      <legend>GetOrder</legend>
      <div class="row"><label for="orderId">Order id</label><input id="orderId" value="ord_demo_1" /></div>
      <button id="getOrder">Send</button>
      <pre id="getOrderOut">(not run)</pre>
    </fieldset>

    <fieldset>
      <legend>ListOrders (server stream)</legend>
      <div class="row"><label for="customerId">Customer id</label><input id="customerId" value="cus_1" /></div>
      <button id="listOrders">Stream</button>
      <pre id="listOrdersOut">(not run)</pre>
    </fieldset>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
