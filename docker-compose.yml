name: grpc-monorepo-starter

services:
  service-a:
    container_name: starter-service-a
    build:
      context: .
      dockerfile: apps/service-a/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HTTP_PORT: 3000
      GRPC_PORT: 50051
      GRPC_HOST: 0.0.0.0
    ports:
      - "${SERVICE_A_HTTP_PORT:-3000}:3000"
      - "${SERVICE_A_GRPC_PORT:-50051}:50051"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  service-b:
    container_name: starter-service-b
    build:
      context: .
      dockerfile: apps/service-b/Dockerfile
    restart: unless-stopped
    depends_on:
      service-a:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HTTP_PORT: 3001
      SERVICE_A_GRPC_URL: service-a:50051
    ports:
      - "${SERVICE_B_HTTP_PORT:-3001}:3001"
